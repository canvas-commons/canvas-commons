name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  HUSKY: 0

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run lint:packages
      - id: sha
        run: echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
        shell: bash

  release-pr:
    name: Release PR
    needs: build
    if: github.repository == 'canvas-commons/canvas-commons'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.build.outputs.sha }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm exec changeset version && pnpm install --lockfile-only
          createGithubReleases: false
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          # Built-in token: the release PR opens fine, but downstream
          # `verify.yml` won't auto-run on it (GitHub anti-loop). Push an
          # empty commit to the PR or close/reopen it to trigger CI when
          # you want to re-verify before merging.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: [build, release-pr]
    if: |
      needs.release-pr.outputs.hasChangesets == 'false' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/org/canvas-commons
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ needs.build.outputs.sha }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      # OIDC trusted publishing needs npm >= 11.5.1 for the id-token exchange
      # to attach provenance attestations. Pinning explicitly so the
      # node-version bundled npm doesn't quietly fall out of range.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm exec changeset publish
