# Adds a Changesets entry to Dependabot PRs that bump direct production
# dependencies, so the bump shows up in the next release's notes. Skipped
# for dev-deps, indirect bumps, and github-actions PRs — none of those
# change shipped library behaviour.
#
# Runs under `pull_request_target` to get a writable token. We don't check
# out or execute any code from the PR head: the only data we trust is
# Dependabot's own metadata. The job is gated on `github.actor` so it
# never fires for human PRs.

name: Dependabot Changeset

on:
  pull_request_target:
    branches: [main]

permissions: {}

jobs:
  changeset:
    name: Add changeset
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true

      - id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip non-shippable bumps
        if: |
          steps.meta.outputs.package-ecosystem != 'npm' ||
          steps.meta.outputs.dependency-type != 'direct:production'
        run: |
          echo "Skipping: ecosystem=${{ steps.meta.outputs.package-ecosystem }}, type=${{ steps.meta.outputs.dependency-type }}"
          echo "skip=true" >> "$GITHUB_OUTPUT"
        id: skip

      - if: steps.skip.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          # Need persistent credentials so the push step at the bottom can
          # use the same token to write back to the PR branch.
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.skip.outputs.skip != 'true'
        name: Write changeset
        env:
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          PREV: ${{ steps.meta.outputs.previous-version }}
          NEW: ${{ steps.meta.outputs.new-version }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          mkdir -p .changeset
          slug=$(printf '%s' "$DEP_NAMES" | tr ',/@' '---' | tr -cd 'a-zA-Z0-9-')
          file=".changeset/dependabot-${slug}-pr${PR_NUMBER}.md"
          {
            echo '---'
            echo "'@canvas-commons/core': patch"
            echo '---'
            echo ''
            if [[ "$DEP_NAMES" == *","* ]]; then
              echo "Bump direct dependencies: $DEP_NAMES."
            else
              echo "Bump \`$DEP_NAMES\` from $PREV to $NEW."
            fi
          } > "$file"

      - if: steps.skip.outputs.skip != 'true'
        name: Commit and push
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .changeset
          if git diff --staged --quiet; then
            echo 'No changeset to add (already present?)'
            exit 0
          fi
          git commit -m 'chore(deps): add changeset'
          git push
