name: OpenSSF Scorecard

on:
  branch_protection_rule: {}
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed for the SARIF upload to the security tab.
      security-events: write
      # Needed for OIDC-based publish to the OpenSSF results dataset.
      id-token: write
      # Needed to read repo content + actions metadata.
      contents: read
      actions: read
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          sarif_file: results.sarif
